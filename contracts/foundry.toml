[profile.default]
src = "src"
out = "out"
libs = ["lib"]
auto_detect_solc = true
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./deployments" }]
ignored_warnings_from = ["lib/"]
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@uniswap/v4-core/=lib/v4-core/src/",
    # v4-core's PoolManager imports `solmate/src/auth/Owned.sol`; v4-core
    # vendors solmate in its own lib/. Without this remap our top-level
    # compile of PoolManager errors with "File not found: solmate/...".
    "solmate/=lib/v4-core/lib/solmate/",
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
avalanche-fuji = "${FUJI_RPC_URL}"
avalanche       = "${AVALANCHE_RPC_URL}"

[etherscan]
# Snowtrace via Routescan — get a free key at https://routescan.io/
avalanche-fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api.routescan.io/v2/network/testnet/evm/43113/etherscan" }
avalanche      = { key = "${SNOWTRACE_API_KEY}", url = "https://api.routescan.io/v2/network/mainnet/evm/43114/etherscan" }
